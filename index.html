<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Touchpoint-Werkstatt – FMCG-Aktivierung Herbst 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #fff; --surface-alt: #efefeb; --surface-sunk: #f5f4f0;
    --border: #d3d1c7; --border-soft: #e4e2d9;
    --text: #1a1a18; --muted: #73726c; --faint: #888780;
    --accent: #185fa5; --accent-bg: #deeaf8; --accent-border: #7aafe0;
    --green: #1d6e4c; --amber: #8a5a0a; --red: #a32d2d;
    --seg-neu: #c77da6; --seg-fmcg: #82be3c; --seg-fmcg-in: #b9d98c;
    --seg-bev: #94c2dc; --seg-ex: #5ba3a8;
    --cat-incentive: #185fa5; --cat-proof: #1d6e4c; --cat-perso: #6b4fb0;
    --cat-disc: #ba7517; --cat-service: #a3556b;
    --col-w: 26px; --lane-label-w: 168px;
    --brand: #c2185b;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  .wrap { padding: 1.75rem 2rem 4rem; max-width: 1700px; margin: 0 auto; }

  .topbar { background: var(--brand); }
  .topbar-inner { max-width: 1700px; margin: 0 auto; padding: 15px 2rem;
    color: #fff; font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }

  header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .toolbar { display: flex; gap: 6px; }
  .btn { font-size: 12px; padding: 6px 12px; border-radius: 8px; border: 0.5px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer; transition: all .15s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent-border); color: var(--accent); }
  .btn-primary { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }

  .camp-bar { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .camp-select { font-size: 13px; font-weight: 500; max-width: 320px; }
  .camp-act { font-size: 11px; padding: 4px 9px; }
  .export-wrap { position: relative; display: inline-block; }
  .export-menu { position: absolute; top: calc(100% + 4px); right: 0; z-index: 30; background: var(--surface);
    border: 0.5px solid var(--border); border-radius: 9px; box-shadow: 0 6px 20px rgba(0,0,0,.12); padding: 4px; min-width: 180px; }
  .export-menu[hidden] { display: none; }
  .export-opt { font-size: 12.5px; padding: 7px 10px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
  .export-opt:hover { background: var(--surface-alt); color: var(--accent); }

  .viewtabs { display: flex; gap: 4px; margin: 1.5rem 0 0; border-bottom: 0.5px solid var(--border); }
  .viewtab { font-size: 13px; padding: 8px 14px; cursor: pointer; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
  .viewtab:hover { color: var(--text); }
  .viewtab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 1.5rem 0; }
  .metric-card { background: var(--surface-alt); border-radius: 12px; padding: .85rem 1.1rem; }
  .metric-card .mnum { font-size: 20px; font-weight: 500; }
  .metric-card .mlabel { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: .9rem; }
  .row-label { font-size: 11px; font-weight: 500; color: var(--faint); letter-spacing: 0.07em;
    text-transform: uppercase; margin-right: 4px; }
  .chip { font-size: 12px; padding: 5px 13px; border-radius: 99px; border: 0.5px solid var(--border);
    background: var(--surface); color: var(--muted); cursor: pointer; transition: all .15s; user-select: none; }
  .chip:hover { color: var(--text); }
  .chip.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
  .chip .x { margin-left: 6px; opacity: .5; }
  .chip-add { border-style: dashed; color: var(--faint); }
  .select { font-size: 12px; padding: 5px 10px; border-radius: 8px; border: 0.5px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer; }

  /* ---- Matrix grid ---- */
  .grid-scroll { overflow-x: auto; border: 0.5px solid var(--border); border-radius: 12px; background: var(--surface); }
  .grid { display: grid; min-width: max-content; }
  .gcell { border-right: 0.5px solid var(--border-soft); border-bottom: 0.5px solid var(--border-soft);
    padding: 7px; min-height: 64px; position: relative; }
  .ghead { position: sticky; top: 0; z-index: 3; background: var(--surface-alt);
    font-size: 11.5px; font-weight: 500; color: var(--text); padding: 9px 8px; min-height: 0;
    border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-start; gap: 4px; }
  .ghead .tp-edit { opacity: 0; cursor: pointer; color: var(--faint); margin-left: auto; flex-shrink: 0; }
  .ghead:hover .tp-edit { opacity: 1; }
  .gcorner { position: sticky; left: 0; top: 0; z-index: 5; background: var(--surface-alt);
    border-bottom: 0.5px solid var(--border); border-right: 0.5px solid var(--border);
    font-size: 11px; color: var(--faint); padding: 9px 10px; display: flex; align-items: center; }
  .gseg { position: sticky; left: 0; z-index: 2; background: var(--surface);
    border-right: 0.5px solid var(--border); padding: 10px; display: flex; flex-direction: column; gap: 4px; justify-content: center; }
  .gseg .seg-name { font-size: 12.5px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
  .seg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; display: inline-block; }
  .gseg .seg-meta { font-size: 10.5px; color: var(--faint); padding-left: 17px; }
  .gbody { cursor: pointer; transition: background .12s; }
  .gbody:hover { background: var(--surface-sunk); }
  .gbody.dim { opacity: .32; }
  .idea { background: var(--surface); border: 0.5px solid var(--border); border-left-width: 3px;
    border-radius: 7px; padding: 6px 8px; margin-bottom: 5px; }
  .idea:last-of-type { margin-bottom: 0; }
  .idea .ititle { font-size: 12px; font-weight: 500; line-height: 1.35; }
  .imeta { display: flex; align-items: center; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
  .mdot { width: 7px; height: 7px; border-radius: 99px; flex-shrink: 0; display: inline-block; }
  .stars { font-size: 10px; color: var(--amber); letter-spacing: -1px; }
  .kwtag { font-size: 9.5px; color: var(--muted); background: var(--surface-alt); padding: 1px 6px; border-radius: 99px; }
  .stat { font-size: 9.5px; padding: 1px 6px; border-radius: 99px; font-weight: 500; }
  .stat-idee { background: #ecebe6; color: #6b6a64; }
  .stat-geplant { background: var(--accent-bg); color: var(--accent); }
  .stat-live { background: #e2f0e8; color: var(--green); }
  .cell-add { font-size: 11px; color: var(--faint); opacity: 0; transition: opacity .12s; }
  .gbody:hover .cell-add { opacity: 1; }
  .cell-count { position: absolute; top: 4px; right: 6px; font-size: 10px; color: var(--faint); }

  /* ---- Timeline ---- */
  .tl-note { font-size: 12px; color: var(--muted); margin-bottom: .75rem; }
  .tl-scroll { overflow: auto; border: 0.5px solid var(--border); border-radius: 12px; background: var(--surface); }
  .tl-inner { position: relative; min-width: max-content; }
  .tl-head { display: flex; position: sticky; top: 0; z-index: 6; background: var(--surface-alt); }
  .tl-corner { width: var(--lane-label-w); flex-shrink: 0; position: sticky; left: 0; z-index: 7;
    background: var(--surface-alt); border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border);
    font-size: 11px; color: var(--faint); padding: 6px 10px; display: flex; align-items: flex-end; }
  .tl-headcols { position: relative; border-bottom: 0.5px solid var(--border); }
  .tl-bands { position: relative; height: 19px; }
  .tl-band { position: absolute; top: 2px; height: 15px; border-radius: 4px; font-size: 10px; font-weight: 500;
    padding: 0 7px; line-height: 15px; white-space: nowrap; overflow: hidden; }
  .tl-weeks { display: flex; }
  .tl-wk { width: var(--col-w); flex-shrink: 0; font-size: 9px; color: var(--faint); text-align: center;
    padding: 15px 0 3px; border-right: 0.5px solid var(--border-soft); position: relative; }
  .tl-wk .mo { position: absolute; top: 1px; left: 2px; font-size: 9px; font-weight: 600; color: var(--muted); white-space: nowrap; }
  .tl-wk.mstart { border-left: 1px solid var(--border); }
  .tl-lanes { position: relative; }
  .tl-laneband { position: absolute; top: 0; bottom: 0; z-index: 0; }
  .tl-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--red); z-index: 4; }
  .tl-today::after { content: "heute"; position: absolute; top: 1px; left: 3px; font-size: 9px; color: var(--red); font-weight: 600; }
  .tl-lane { display: flex; position: relative; z-index: 1; border-bottom: 0.5px solid var(--border-soft); }
  .tl-lane-label { width: var(--lane-label-w); flex-shrink: 0; position: sticky; left: 0; z-index: 3;
    background: var(--surface); border-right: 0.5px solid var(--border); padding: 8px 10px;
    display: flex; flex-direction: column; gap: 4px; justify-content: center; }
  .tl-lane-label .seg-name { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
  .tl-unplanned { font-size: 10px; color: var(--faint); padding-left: 17px; cursor: default; }
  .tl-track { position: relative; flex-shrink: 0; }
  .tl-bar { position: absolute; height: 22px; border-radius: 6px; padding: 0 7px; display: flex; align-items: center;
    cursor: pointer; border: 1.5px solid transparent; overflow: hidden; transition: filter .12s, box-shadow .12s; }
  .tl-bar:hover { filter: brightness(1.04); box-shadow: 0 2px 8px rgba(0,0,0,.16); z-index: 5; }
  .tl-bar .t { white-space: nowrap; text-overflow: ellipsis; overflow: hidden; font-size: 11px; font-weight: 500; color: #13261a; }
  .tl-bar.st-geplant { background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.55) 0 5px, transparent 5px 10px); }
  .tl-bar.st-idee { background-color: transparent !important; }
  .tl-bar.st-idee .t { color: var(--muted); }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-top: .75rem; align-items: center; }
  .legend span.li { display: flex; align-items: center; gap: 6px; }
  .lg-swatch { width: 22px; height: 13px; border-radius: 4px; display: inline-block; border: 1.5px solid transparent; }

  /* ---- Drawer ---- */
  .scrim { position: fixed; inset: 0; background: rgba(26,26,24,.28); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 40; }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 450px; max-width: 92vw; background: var(--bg);
    box-shadow: -8px 0 30px rgba(0,0,0,.12); transform: translateX(100%); transition: transform .22s ease; z-index: 41; display: flex; flex-direction: column; }
  .drawer.open { transform: translateX(0); }
  .drawer-head { padding: 1.1rem 1.25rem; border-bottom: 0.5px solid var(--border); position: relative; }
  .drawer-head .dctx { font-size: 11px; color: var(--faint); letter-spacing: .05em; text-transform: uppercase; }
  .drawer-head .dtitle { font-size: 16px; font-weight: 500; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
  .drawer-close { position: absolute; top: 1rem; right: 1.1rem; cursor: pointer; color: var(--muted); font-size: 18px; }
  .drawer-body { overflow-y: auto; padding: 1rem 1.25rem 2rem; flex: 1; }
  .drawer-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: .9rem; }
  .d-count { font-size: 12px; color: var(--muted); }
  .card-sum { background: var(--surface); border: 0.5px solid var(--border); border-left-width: 3px; border-radius: 9px;
    padding: 9px 11px; margin-bottom: 8px; cursor: pointer; transition: border-color .12s; }
  .card-sum:hover { border-color: var(--accent-border); }
  .card-sum .ititle { font-size: 13px; font-weight: 500; }
  .csum-desc { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .csum-edit { font-size: 11px; color: var(--accent); margin-left: auto; }
  .editor { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: .85rem; margin-bottom: .9rem; }
  .ed-head { font-size: 11px; font-weight: 600; color: var(--faint); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px; }
  label.fl { font-size: 11px; font-weight: 500; color: var(--faint); letter-spacing: .05em; text-transform: uppercase; display: block; margin: 10px 0 5px; }
  input.tf, textarea.tf { width: 100%; font-family: inherit; font-size: 13px; padding: 7px 9px; border: 0.5px solid var(--border);
    border-radius: 7px; background: var(--surface); color: var(--text); resize: vertical; }
  input.tf:focus, textarea.tf:focus { outline: none; border-color: var(--accent-border); }
  .mech-pick { display: flex; flex-wrap: wrap; gap: 5px; }
  .mech-chip { font-size: 11px; padding: 3px 9px; border-radius: 99px; border: 0.5px solid var(--border);
    background: var(--surface); color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .mech-chip.on { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
  .kw-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .kw-lbl { font-size: 12px; color: var(--muted); }
  .tf-mini { font-family: inherit; font-size: 12px; padding: 5px 7px; border: 0.5px solid var(--border); border-radius: 7px; background: var(--surface); color: var(--text); }
  .tf-mini.wk { width: 56px; }
  .kw-hint { font-size: 11px; color: var(--faint); margin-top: 6px; }
  .kw-clear { font-size: 11px; color: var(--accent); cursor: pointer; }
  .prio-pick, .stat-pick { display: flex; gap: 5px; }
  .opt { font-size: 12px; padding: 4px 11px; border-radius: 7px; border: 0.5px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; }
  .opt.on { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); }
  .ed-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 8px; }
  .ed-actions span { display: flex; gap: 8px; }
  .link-del { font-size: 12px; color: var(--red); cursor: pointer; background: none; border: none; }
  .link-cancel { font-size: 12px; color: var(--muted); cursor: pointer; background: none; border: none; }
  .empty { font-size: 12.5px; color: var(--faint); padding: 1.5rem 0; text-align: center; line-height: 1.7; }

  /* ---- Glossary ---- */
  .gloss-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .mcard { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; }
  .mcard .mtop { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .mcard .mname { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .catbadge { font-size: 10.5px; padding: 2px 9px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
  .mcard .mdesc { font-size: 12.5px; color: var(--muted); margin-top: 8px; line-height: 1.6; }
  .uses { margin-top: 11px; border-top: 0.5px solid var(--border-soft); padding-top: 9px; }
  .uses-h { font-size: 11px; font-weight: 500; color: var(--faint); letter-spacing: .05em; text-transform: uppercase; }
  .use-item { font-size: 12px; color: var(--text); padding: 4px 0; cursor: pointer; display: flex; align-items: center; gap: 7px; }
  .use-item:hover { color: var(--accent); }
  .use-seg { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .mcard .medit { font-size: 11px; color: var(--faint); cursor: pointer; margin-top: 10px; display: inline-block; }
  .mcard .medit:hover { color: var(--accent); }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text);
    color: #fff; font-size: 12.5px; padding: 8px 16px; border-radius: 8px; opacity: 0; pointer-events: none; transition: all .2s; z-index: 60; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .footer { margin-top: 2.5rem; font-size: 11px; color: var(--faint); border-top: 0.5px solid var(--border); padding-top: 1rem; }
  .footer:empty { display: none; }

  /* ---- Summary ---- */
  #summary-body { margin-top: .5rem; max-width: 920px; }
  .sum-seg { padding: .9rem 0; border-bottom: 0.5px solid var(--border-soft); }
  .sum-seg-h { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .sum-group-h { font-size: 11px; font-weight: 600; color: var(--faint); letter-spacing: .04em; text-transform: uppercase; margin: .75rem 0 .35rem 18px; }
  .sum-idea { margin: 0 0 .5rem 18px; font-size: 13px; line-height: 1.5; }
  .sum-idea .t { font-weight: 500; }
  .sum-idea .imeta { display: inline-flex; gap: 6px; margin-left: 4px; vertical-align: middle; }
  .sum-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .tag-new { background: #e2f0e8; color: var(--green); }
  .tag-changed { background: var(--accent-bg); color: var(--accent); }
  .aa-row { display: flex; gap: 10px; }
  .aa-col { flex: 1; min-width: 0; }
  .aa-manage-sec { margin-bottom: 1.1rem; }
  .aa-manage-sec .uses-h { margin-bottom: 8px; }
  .aa-item { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 7px 0; border-top: 0.5px solid var(--border-soft); }
  .aa-item .aa-name { flex: 1; min-width: 120px; }
  .aa-item .aa-count { font-size: 11px; color: var(--faint); white-space: nowrap; }
  .aa-item .select { font-size: 11px; padding: 4px 6px; }
  .aa-item .link-del { font-size: 16px; line-height: 1; padding: 0 2px; }

  @media (max-width: 640px) { .metric-grid { grid-template-columns: 1fr 1fr; } .wrap { padding: 1.25rem 1rem 3rem; } }
  @media print {
    body { background: #fff; } .toolbar, .viewtabs, .row, .cell-add, .drawer, .scrim, .footer .noprint { display: none !important; }
    .grid-scroll, .tl-scroll { overflow: visible; } .gbody.dim { opacity: 1; }
  }
</style>
</head>
<body>
<div class="topbar"><div class="topbar-inner">falschenpost - Touchpoint Werkstatt</div></div>
<div class="wrap">
  <header>
    <div>
      <div class="camp-bar">
        <select class="select camp-select" id="camp-select" title="Kampagne wählen"></select>
        <button class="btn camp-act" id="camp-new">+ Neue Kampagne</button>
        <button class="btn camp-act" id="camp-rename">Umbenennen</button>
        <button class="btn camp-act" id="camp-del">Löschen</button>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn" id="btn-import">Import</button>
      <div class="export-wrap">
        <button class="btn" id="btn-export">Export ▾</button>
        <div class="export-menu" id="export-menu" hidden>
          <div class="export-opt" data-export="campaign">Aktive Kampagne</div>
          <div class="export-opt" data-export="workspace">Gesamter Workspace</div>
        </div>
      </div>
      <button class="btn" id="btn-print">Drucken</button>
      <input type="file" id="file-input" accept="application/json" hidden>
    </div>
  </header>

  <div class="viewtabs">
    <div class="viewtab active" data-view="matrix">Matrix</div>
    <div class="viewtab" data-view="timeline">Zeitstrahl</div>
    <div class="viewtab" data-view="glossary">Glossar</div>
    <div class="viewtab" data-view="summary">Zusammenfassung</div>
  </div>

  <div id="view-matrix">
    <div class="metric-grid" id="metrics"></div>
    <div class="row" id="domain-row"></div>
    <div class="row" id="filter-row"></div>
    <div class="grid-scroll"><div class="grid" id="grid"></div></div>
  </div>

  <div id="view-timeline" style="display:none">
    <div class="row" id="tl-filter-row" style="margin-top:1.5rem"></div>
    <div class="tl-note" id="tl-note"></div>
    <div class="tl-scroll"><div class="tl-inner" id="tl-inner"></div></div>
    <div class="legend" id="tl-legend"></div>
  </div>

  <div id="view-glossary" style="display:none">
    <div class="row" style="margin-top:1.5rem; justify-content:space-between">
      <span style="display:flex; gap:8px; align-items:center">
        <span class="row-label" style="margin-right:0">Aggregation</span>
        <select class="select" id="gloss-dim" style="font-size:12px">
          <option value="mech">Mechanik</option>
          <option value="action">Aktionen</option>
          <option value="article">Artikel</option>
        </select>
        <span class="row-label" id="gloss-hint" style="margin-right:0; text-transform:none; letter-spacing:0"></span>
      </span>
      <span style="display:flex; gap:6px">
        <button class="btn btn-primary" id="btn-add-mech">+ Mechanismus</button>
        <button class="btn btn-primary" id="btn-add-val" style="display:none">+ Aktion</button>
      </span>
    </div>
    <div class="gloss-grid" id="gloss-grid"></div>
  </div>

function seedWorkspace() { const c = seed(); return { version: 2, activeCampaignId: c.id, campaigns: [c] }; }

/* aktive Kampagne */
function cur() { return state.campaigns.find(c => c.id === state.activeCampaignId) || state.campaigns[0]; }

/* defensive Migration einer einzelnen Kampagne */
function migrateCampaign(c) {
  c = c || {};
  if (!c.id) c.id = "c_" + uid();
  if (!c.name) c.name = "Kampagne";
  if (typeof c.subtitle !== "string") c.subtitle = "";
  c.segments = c.segments || []; c.domains = c.domains || [];
  c.mechanisms = c.mechanisms || []; c.ideas = c.ideas || [];
  c.actions = Array.isArray(c.actions) ? c.actions : []; c.articles = Array.isArray(c.articles) ? c.articles : [];
  if (!c.ui) c.ui = { domain: c.domains[0]?.id || "shop", filterMech: "", filterStatus: "" };
  if (!c.ui.tl) c.ui.tl = { domain: "", tp: "", mech: "", status: "" };
  c.ideas.forEach(i => { if (!Array.isArray(i.mechs)) i.mechs = []; if (i.timing === undefined) i.timing = null; });
  return c;
}
/* Migration eines geladenen/importierten Workspace (inkl. altem v1-Einzelobjekt) */
function migrateWorkspace(w) {
  if (!w || !Array.isArray(w.campaigns)) {
    const camp = migrateCampaign(w);
    camp.name = "FMCG-Aktivierung Herbst 2026";
    if (!camp.subtitle) camp.subtitle = "Segmente × Touchpoints · Ideen, Mechanismen & Timing";
    return { version: 2, activeCampaignId: camp.id, campaigns: [camp] };
  }
  w.version = 2;
  w.campaigns = w.campaigns.map(migrateCampaign);
  if (!w.activeCampaignId || !w.campaigns.find(c => c.id === w.activeCampaignId)) w.activeCampaignId = w.campaigns[0]?.id;
  return w;
}

let state = seedWorkspace();
let storageOK = true;
// Speicher-Backend automatisch wählen: in der Claude-Umgebung window.storage, sonst localStorage
const hasWS = typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";

async function load() {
  let raw = null;
  if (hasWS) { try { const r = await window.storage.get(KEY, false); if (r && r.value) raw = r.value; } catch (e) {} }
  else { try { raw = localStorage.getItem(KEY); } catch (e) {} }
  if (raw) { try { state = migrateWorkspace(JSON.parse(raw)); } catch (e) {} }
}
let saveT;
function save() {
  clearTimeout(saveT);
  saveT = setTimeout(() => {
    const v = JSON.stringify(state);
    if (hasWS) { try { window.storage.set(KEY, v, false); } catch (e) { storageOK = false; } }
    else { try { localStorage.setItem(KEY, v); } catch (e) { storageOK = false; } }
  }, 250);
}

/* ---------- helpers ---------- */
const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => [...r.querySelectorAll(s)];
const esc = s => (s || "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const seg = id => cur().segments.find(s => s.id === id);
const mech = id => cur().mechanisms.find(m => m.id === id);
const domain = id => cur().domains.find(d => d.id === id);
const tp = (dom, id) => domain(dom)?.touchpoints.find(t => t.id === id);

function toast(msg) { const t = $("#toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 1600); }

/* ---------- ISO week helpers ---------- */
function isoWeekNum(d) {
  const dt = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
  const day = dt.getUTCDay() || 7; dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const ys = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - ys) / DAY) + 1) / 7);
}
function isoWeekYear(d) {
  const dt = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
  const day = dt.getUTCDay() || 7; dt.setUTCDate(dt.getUTCDate() + 4 - day);
  return dt.getUTCFullYear();
}
function weeksInISOYear(y) { return isoWeekNum(new Date(Date.UTC(y, 11, 28))); }
function weekToIdx(y, w) { let idx = 0; for (let yy = BASE_YEAR; yy < y; yy++) idx += weeksInISOYear(yy); return idx + w; }
function idxToYW(idx) { let y = BASE_YEAR; while (idx > weeksInISOYear(y)) { idx -= weeksInISOYear(y); y++; } return { y, w: idx }; }
function isoWeekMonday(y, w) {
  const jan4 = new Date(Date.UTC(y, 0, 4)); const dow = jan4.getUTCDay() || 7;
  const mon = new Date(jan4); mon.setUTCDate(jan4.getUTCDate() - (dow - 1) + (w - 1) * 7); return mon;
}

/* ---------- metrics ---------- */
function renderMetrics() {

/* ---------- matrix grid ---------- */
function matchMatrix(i) {
  if (cur().ui.filterMech && !i.mechs.includes(cur().ui.filterMech)) return false;
  if (cur().ui.filterStatus && i.status !== cur().ui.filterStatus) return false;
  return true;
}
function kwLabel(t) { return t ? `KW${t.fw}${t.fy !== t.ty || t.fw !== t.tw ? "–" + (t.ty !== t.fy ? t.ty % 100 + "/" : "") + t.tw : ""}` : ""; }
function ideaMini(i) {
  const dots = i.mechs.slice(0, 4).map(mid => { const m = mech(mid); return m ? `<span class="mdot" style="background:${CATS[m.cat].color}" title="${esc(m.name)}"></span>` : ""; }).join("");
  const stars = i.prio ? `<span class="stars">${"★".repeat(i.prio)}</span>` : "";
  const kw = i.timing ? `<span class="kwtag">${kwLabel(i.timing)}</span>` : "";
  const segColor = seg(i.segId)?.color || "var(--border)";
  return `<div class="idea" data-idea="${i.id}" style="border-left-color:${segColor}">
    <div class="ititle">${esc(i.title)}</div>
    <div class="imeta">${dots}${stars}${kw}<span class="stat stat-${i.status}">${i.status}</span></div></div>`;
}
function renderGrid() {

  grid.style.gridTemplateColumns = `220px repeat(${tps.length}, minmax(190px, 1fr)) 132px`;

  html += `<div class="gcell ghead" style="background:var(--surface)"><span class="chip chip-add" id="add-tp" style="padding:3px 9px">+ Touchpoint</span></div>`;
  cur().segments.forEach(s => {

    tps.forEach(t => {
      const list = cellIdeas(dom, t.id, s.id), shown = list.filter(matchMatrix);
      const dim = (cur().ui.filterMech || cur().ui.filterStatus) && shown.length === 0 && list.length > 0;
      html += `<div class="gcell gbody ${dim ? "dim" : ""}" data-cell="${t.id}::${s.id}">
        ${list.length ? `<span class="cell-count">${shown.length < list.length ? shown.length + "/" : ""}${list.length}</span>` : ""}
        ${shown.map(ideaMini).join("")}
        <span class="cell-add">${list.length ? "+ Idee" : "+ Idee hinzufügen"}</span></div>`;

    html += `<div class="gcell"></div>`;

}

/* ---------- timeline ---------- */
function renderTlFilters() {
  const tl = cur().ui.tl;
  const domOpts = `<option value="">Domäne: alle</option>` +
    cur().domains.map(d => `<option value="${d.id}" ${tl.domain === d.id ? "selected" : ""}>${esc(d.name)}</option>`).join("");

  const mechOpts = `<option value="">Mechanismus: alle</option>` +
    cur().mechanisms.map(m => `<option value="${m.id}" ${tl.mech === m.id ? "selected" : ""}>${esc(m.name)}</option>`).join("");
  const statOpts = `<option value="">Status: alle</option>` +
    STATUSES.map(s => `<option value="${s}" ${tl.status === s ? "selected" : ""}>${s}</option>`).join("");
  $("#tl-filter-row").innerHTML = `<span class="row-label">Filter</span>
    <select class="select" id="tlf-dom">${domOpts}</select>
    <select class="select" id="tlf-tp" ${tl.domain ? "" : "disabled"}>${tpOpts}</select>
    <select class="select" id="tlf-mech">${mechOpts}</select>
    <select class="select" id="tlf-stat">${statOpts}</select>
    ${(tl.domain || tl.tp || tl.mech || tl.status) ? `<span class="chip" id="tlf-clear">Filter zurücksetzen <span class="x">✕</span></span>` : ""}`;
}
function matchTl(i) {
  const tl = cur().ui.tl;
  if (tl.domain && i.domainId !== tl.domain) return false;
  if (tl.tp && i.tpId !== tl.tp) return false;
  if (tl.mech && !i.mechs.includes(tl.mech)) return false;
  if (tl.status && i.status !== tl.status) return false;
  return true;
}
function packTracks(cards) {
  const sorted = cards.slice().sort((a, b) => a._s - b._s);
  const tracks = [];
  sorted.forEach(c => {
    let placed = false;
    for (const tr of tracks) { if (tr[tr.length - 1]._e < c._s) { tr.push(c); c._track = tracks.indexOf(tr); placed = true; break; } }
    if (!placed) { c._track = tracks.length; tracks.push([c]); }
  });
  return Math.max(tracks.length, 1);
}
function renderTimeline() {
  const COLW = 26, TRACKH = 28, LANEPAD = 8;
  // frame
  let minIdx = weekToIdx(2026, 35), maxIdx = weekToIdx(2027, 9);
  cur().ideas.filter(i => i.timing && matchTl(i)).forEach(i => {
    const s = weekToIdx(i.timing.fy, i.timing.fw), e = weekToIdx(i.timing.ty, i.timing.tw);
    minIdx = Math.min(minIdx, s, e); maxIdx = Math.max(maxIdx, s, e);
  });
  const nWeeks = maxIdx - minIdx + 1, fullW = nWeeks * COLW;

  // header: bands + weeks
  let bands = "";
  const bandDef = [
    { from: weekToIdx(2026, 40), to: weekToIdx(2026, 52), label: "Q4 2026 · Stabilisieren & lernen", bg: "#f6ecd6", fg: "#8a5a0a" },
    { from: weekToIdx(2027, 1),  to: maxIdx,              label: "Anfang 2027 · Demand Gen",         bg: "#deeaf8", fg: "#185fa5" }
  ];
  bandDef.forEach(b => {
    const f = Math.max(b.from, minIdx), t = Math.min(b.to, maxIdx); if (t < f) return;
    bands += `<div class="tl-band" style="left:${(f - minIdx) * COLW}px;width:${(t - f + 1) * COLW}px;background:${b.bg};color:${b.fg}">${b.label}</div>`;
  });
  // rollout marker (KW36/2026)
  const rollIdx = weekToIdx(2026, 36);
  if (rollIdx >= minIdx && rollIdx <= maxIdx) bands += `<div class="tl-band" style="left:${(rollIdx - minIdx) * COLW}px;width:${COLW}px;background:#1a1a18;color:#fff;padding:0 3px" title="Rollout 01.09.2026">▸</div>`;

  let weeks = "";
  for (let idx = minIdx; idx <= maxIdx; idx++) {
    const { y, w } = idxToYW(idx); const mon = isoWeekMonday(y, w);
    const monStart = (w === minIdxYW().w && idx === minIdx) || mon.getUTCDate() <= 7;
    weeks += `<div class="tl-wk ${monStart ? "mstart" : ""}">${monStart ? `<span class="mo">${MONTHS[mon.getUTCMonth()]} ${y % 100}</span>` : ""}${w}</div>`;
  }
  function minIdxYW() { return idxToYW(minIdx); }

  // lanes
  let lanes = "";
  // background phase bands behind lanes
  let laneBands = "";
  bandDef.forEach(b => {
    const f = Math.max(b.from, minIdx), t = Math.min(b.to, maxIdx); if (t < f) return;
    laneBands += `<div class="tl-laneband" style="left:${var_left(f)}px;width:${(t - f + 1) * COLW}px;background:${b.bg}66;opacity:.4"></div>`;
  });
  function var_left(idx) { return /* lane label width */ 168 + (idx - minIdx) * COLW; }

  cur().segments.forEach(s => {
    const cards = cur().ideas.filter(i => i.segId === s.id && i.timing && matchTl(i)).map(i => {
      const a = weekToIdx(i.timing.fy, i.timing.fw), b = weekToIdx(i.timing.ty, i.timing.tw);
      return Object.assign({}, i, { _s: Math.min(a, b), _e: Math.max(a, b) });
    });
    const trackCount = packTracks(cards);
    const laneH = trackCount * TRACKH + LANEPAD;
    const untimed = cur().ideas.filter(i => i.segId === s.id && !i.timing && matchTl(i));
    let bars = "";
    cards.forEach(c => {
      const left = (c._s - minIdx) * COLW + 1, width = (c._e - c._s + 1) * COLW - 2, top = c._track * TRACKH + 4;
      const segColor = s.color;
      const st = c.status;
      const styleBg = st === "idee" ? `border-color:${segColor};` : `background-color:${segColor};`;
      const tip = `${s.name} · ${tp(c.domainId, c.tpId)?.name || "?"} (${domain(c.domainId).name}) · ${kwLabel(c.timing)} · ${st}`;
      bars += `<div class="tl-bar st-${st}" data-bar="${c.id}" title="${esc(tip)}" style="left:${left}px;width:${Math.max(width, 14)}px;top:${top}px;${styleBg}">
        <span class="t">${c.prio ? "★ " : ""}${esc(c.title)}</span></div>`;
    });
    lanes += `<div class="tl-lane" style="height:${laneH}px">
      <div class="tl-lane-label">
        <div class="seg-name"><span class="seg-dot" style="background:${s.color}"></span>${esc(s.name)}</div>
        ${untimed.length ? `<div class="tl-unplanned" title="${esc(untimed.map(u => u.title).join("\n"))}">${untimed.length} ungeplant</div>` : ""}
      </div>
      <div class="tl-track" style="width:${fullW}px; background:repeating-linear-gradient(to right, transparent 0 ${COLW - 1}px, var(--border-soft) ${COLW - 1}px ${COLW}px)">${bars}</div>
    </div>`;
  });

  // today line
  const now = new Date(); const tIdx = weekToIdx(isoWeekYear(now), isoWeekNum(now));
  let today = "";
  if (tIdx >= minIdx && tIdx <= maxIdx) today = `<div class="tl-today" style="left:${var_left(tIdx)}px"></div>`;

  $("#tl-inner").innerHTML =
    `<div class="tl-head"><div class="tl-corner">Segment / KW</div>
       <div class="tl-headcols" style="width:${fullW}px"><div class="tl-bands">${bands}</div><div class="tl-weeks">${weeks}</div></div></div>
     <div class="tl-lanes">${laneBands}${today}${lanes}</div>`;

  // note
  const { y: ty, w: tw } = idxToYW(tIdx);
  const inFrame = tIdx >= minIdx && tIdx <= maxIdx;
  $("#tl-note").innerHTML = `Heute: KW${tw}/${ty}. ${inFrame ? "Die Heute-Linie markiert, was aktuell läuft." : "Liegt vor dem Planungsfenster – die Zeitachse ist derzeit eine Planungssicht."} Balken klicken zum Bearbeiten.`;

  // legend
  $("#tl-legend").innerHTML = `
    <span class="li"><span class="lg-swatch" style="background:var(--seg-bev)"></span>live (voll)</span>
    <span class="li"><span class="lg-swatch st-geplant" style="background:var(--seg-bev);background-image:repeating-linear-gradient(45deg, rgba(255,255,255,.55) 0 5px, transparent 5px 10px)"></span>geplant (gestreift)</span>
    <span class="li"><span class="lg-swatch" style="border:1.5px dashed var(--seg-bev)"></span>Idee (gestrichelt)</span>
    <span class="li" style="margin-left:8px">Farbe = Segment</span>`;
}

/* ---------- summary (Matrix in Textform) ---------- */
const RECENT_MS = 7 * DAY; // Default-Fenster für Badges, wenn kein Stichtag gesetzt ist
const nowTs = () => Date.now();
// eindeutige, nicht-leere Werte eines Idee-Feldes (action/article) über die aktive Kampagne
function distinctVals(key) {
  return [...new Set(cur().ideas.map(i => (i[key] || "").trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, "de"));
}
// Namens-Registry pro Kampagne (auch Werte ohne zugeordnete Karten)
function regFor(key) { const c = cur(), f = key === "action" ? "actions" : "articles"; if (!Array.isArray(c[f])) c[f] = []; return c[f]; }
// alle bekannten Werte: Registry ∪ aus Karten abgeleitet
function allVals(key) {
  return [...new Set([...regFor(key), ...cur().ideas.map(i => i[key] || "")].map(s => (s || "").trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, "de"));
}
function fmtTs(ts) { if (!ts) return ""; const d = new Date(ts), p = x => String(x).padStart(2, "0");
  return `${p(d.getDate())}.${p(d.getMonth() + 1)}.${d.getFullYear()}, ${p(d.getHours())}:${p(d.getMinutes())}`; }
function fmtDate(s) { if (!s) return ""; const d = new Date(s + "T00:00:00"), p = x => String(x).padStart(2, "0");
  return isNaN(d) ? s : `${p(d.getDate())}.${p(d.getMonth() + 1)}.${d.getFullYear()}`; }
// Stichtag (00:00 lokal) als ms, oder null wenn keiner gesetzt
function cutoffMs() { const s = cur().ui.sumSince; if (!s) return null; const d = new Date(s + "T00:00:00"); return isNaN(d) ? null : d.getTime(); }
// Schwelle für die neu/geändert-Badges: Stichtag, sonst letzte 7 Tage
function badgeThreshold() { const c = cutoffMs(); return c != null ? c : Date.now() - RECENT_MS; }
function changeKind(i) { const thr = badgeThreshold();
  if (i.createdAt && i.createdAt >= thr) return "neu";
  if (i.updatedAt && i.updatedAt >= thr) return "geändert";
  return null; }
function changeBadge(i) { const k = changeKind(i); return k ? `<span class="stat tag-${k === "neu" ? "new" : "changed"}">${k}</span>` : ""; }

function renderSummary() {
  const c = cur(), all = c.ideas, cut = cutoffMs(), since = c.ui.sumSince || "";
  let segF = c.ui.sumSeg || "";
  if (segF && !c.segments.find(s => s.id === segF)) { segF = ""; c.ui.sumSeg = ""; }
  const actVals = allVals("action"), artVals = allVals("article");
  let actF = c.ui.sumAction || "", artF = c.ui.sumArticle || "";
  if (actF && !actVals.includes(actF)) { actF = ""; c.ui.sumAction = ""; }
  if (artF && !artVals.includes(artF)) { artF = ""; c.ui.sumArticle = ""; }
  const segSel = $("#sum-seg");
  if (segSel) segSel.innerHTML = `<option value="">Kundengruppe: alle</option>` +
    c.segments.map(s => `<option value="${s.id}" ${segF === s.id ? "selected" : ""}>${esc(s.name)}</option>`).join("");
  const actSel = $("#sum-action");
  if (actSel) actSel.innerHTML = `<option value="">Aktion: alle</option>` +
    actVals.map(v => `<option value="${esc(v)}" ${actF === v ? "selected" : ""}>${esc(v)}</option>`).join("");
  const artSel = $("#sum-article");
  if (artSel) artSel.innerHTML = `<option value="">Artikel: alle</option>` +
    artVals.map(v => `<option value="${esc(v)}" ${artF === v ? "selected" : ""}>${esc(v)}</option>`).join("");
  const sinceEl = $("#sum-since"); if (sinceEl && sinceEl.value !== since) sinceEl.value = since;
  const clearEl = $("#sum-since-clear"); if (clearEl) clearEl.hidden = !since;

  let visible = cut != null ? all.filter(i => (i.updatedAt || i.createdAt || 0) >= cut) : all;
  if (segF) visible = visible.filter(i => i.segId === segF);
  if (actF) visible = visible.filter(i => (i.action || "") === actF);
  if (artF) visible = visible.filter(i => (i.article || "") === artF);
  const anyFilter = cut != null || !!segF || !!actF || !!artF;
  const segList = segF ? c.segments.filter(s => s.id === segF) : c.segments;

  $("#sum-totals").textContent =
    `${all.length} Idee${all.length === 1 ? "" : "n"} · ${all.filter(i => i.status === "geplant").length} geplant · ${all.filter(i => i.status === "live").length} live · ${all.filter(i => i.timing).length} mit Timing` +
    (cut != null || segF || actF || artF ? ` · ${visible.length} gefiltert` : "");
  if (!all.length) { $("#summary-body").innerHTML = `<div class="empty">Noch keine Ideen in dieser Kampagne.</div>`; return; }
  if (!visible.length) { $("#summary-body").innerHTML = `<div class="empty">Keine Einträge für die aktuelle Filterauswahl.</div>`; return; }
  let html = "";
  segList.forEach(s => {
    const segIdeas = visible.filter(i => i.segId === s.id);
    if (anyFilter && !segIdeas.length) return;
    html += `<div class="sum-seg"><div class="sum-seg-h"><span class="seg-dot" style="background:${s.color}"></span>${esc(s.name)}` +
      `<span style="color:var(--faint);font-weight:400;font-size:12px">· ${segIdeas.length} Idee${segIdeas.length === 1 ? "" : "n"}${s.meta ? " · " + esc(s.meta) : ""}</span></div>`;
    if (!segIdeas.length) { html += `<div class="sum-idea" style="color:var(--faint)">— keine Ideen</div></div>`; return; }
    c.domains.forEach(d => d.touchpoints.forEach(t => {
      const cell = segIdeas.filter(i => i.domainId === d.id && i.tpId === t.id);
      if (!cell.length) return;
      html += `<div class="sum-group-h">${esc(d.name)} › ${esc(t.name)}</div>`;
      cell.forEach(i => {
        const mechs = i.mechs.map(mid => mech(mid)?.name).filter(Boolean);
        const stars = i.prio ? `<span class="stars">${"★".repeat(i.prio)}</span>` : "";
        const kw = i.timing ? `<span class="kwtag">${kwLabel(i.timing)}</span>` : "";
        const aa = [(i.action || "").trim() ? "Aktion: " + esc(i.action.trim()) : "", (i.article || "").trim() ? "Artikel: " + esc(i.article.trim()) : ""].filter(Boolean).join(" · ");
        html += `<div class="sum-idea"><span class="t">${esc(i.title)}</span>` +
          `<span class="imeta"><span class="stat stat-${i.status}">${i.status}</span>${stars}${kw}${changeBadge(i)}</span>` +
          `${aa ? `<div class="sum-sub">${aa}</div>` : ""}` +
          `${mechs.length ? `<div class="sum-sub">Mechanismen: ${mechs.map(esc).join(", ")}</div>` : ""}` +
          `${i.desc ? `<div class="sum-sub">${esc(i.desc)}</div>` : ""}` +
          `${i.updatedAt ? `<div class="sum-sub" style="color:var(--faint)">Zuletzt geändert: ${fmtTs(i.updatedAt)}</div>` : ""}</div>`;
      });
    }));
    html += `</div>`;
  });
  $("#summary-body").innerHTML = html;
}
function summaryText() {
  const c = cur(), all = c.ideas, cut = cutoffMs(), since = c.ui.sumSince || "";
  const segF = c.ui.sumSeg && c.segments.find(s => s.id === c.ui.sumSeg) ? c.ui.sumSeg : "";
  const actVals = allVals("action"), artVals = allVals("article");
  const actF = c.ui.sumAction && actVals.includes(c.ui.sumAction) ? c.ui.sumAction : "";
  const artF = c.ui.sumArticle && artVals.includes(c.ui.sumArticle) ? c.ui.sumArticle : "";
  let visible = cut != null ? all.filter(i => (i.updatedAt || i.createdAt || 0) >= cut) : all;
  if (segF) visible = visible.filter(i => i.segId === segF);
  if (actF) visible = visible.filter(i => (i.action || "") === actF);
  if (artF) visible = visible.filter(i => (i.article || "") === artF);
  const anyFilter = cut != null || !!segF || !!actF || !!artF;
  const segList = segF ? c.segments.filter(s => s.id === segF) : c.segments;
  let out = `${c.name}\n${all.length} Ideen · ${all.filter(i => i.status === "geplant").length} geplant · ${all.filter(i => i.status === "live").length} live · ${all.filter(i => i.timing).length} mit Timing` +
    (segF ? ` · Kundengruppe: ${seg(segF)?.name || ""}` : "") +
    (actF ? ` · Aktion: ${actF}` : "") +
    (artF ? ` · Artikel: ${artF}` : "") +
    (cut != null ? ` · Änderungen ab ${fmtDate(since)} (${visible.length})` : "") + `\n`;
  segList.forEach(s => {
    const segIdeas = visible.filter(i => i.segId === s.id);
    if (anyFilter && !segIdeas.length) return;
    out += `\n## ${s.name} (${segIdeas.length})${s.meta ? " — " + s.meta : ""}\n`;
    if (!segIdeas.length) { out += `  — keine Ideen\n`; return; }
    c.domains.forEach(d => d.touchpoints.forEach(t => {
      const cell = segIdeas.filter(i => i.domainId === d.id && i.tpId === t.id);
      if (!cell.length) return;
      out += `  ${d.name} › ${t.name}\n`;
      cell.forEach(i => {
        const mechs = i.mechs.map(mid => mech(mid)?.name).filter(Boolean);
        const k = changeKind(i);
        out += `    • ${i.title} [${i.status}${i.prio ? ", Prio " + i.prio : ""}${i.timing ? ", " + kwLabel(i.timing) : ""}${k ? ", " + k : ""}]\n`;
        const aa = [(i.action || "").trim() ? "Aktion: " + i.action.trim() : "", (i.article || "").trim() ? "Artikel: " + i.article.trim() : ""].filter(Boolean).join(" · ");
        if (aa) out += `      ${aa}\n`;
        if (mechs.length) out += `      Mechanismen: ${mechs.join(", ")}\n`;
        if (i.desc) out += `      ${i.desc}\n`;
        if (i.updatedAt) out += `      Zuletzt geändert: ${fmtTs(i.updatedAt)}\n`;
      });
    }));
  });
  return out;
}
function copyText(txt) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(txt); toast("Zusammenfassung kopiert."); return; }
  } catch (e) {}
  const ta = document.createElement("textarea"); ta.value = txt;
  ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); toast("Zusammenfassung kopiert."); } catch (e) { toast("Kopieren nicht möglich."); }
  document.body.removeChild(ta);
}

/* ---------- Aktionen & Artikel: Werte über alle Karten pflegen ---------- */
function addValue(key) {
  const label = key === "action" ? "Aktion" : "Artikel";
  const n = prompt(`Name der neuen ${label}?`); if (!n || !n.trim()) return;
  const v = n.trim();
  if (allVals(key).includes(v)) { toast(`${label} existiert bereits.`); return; }
  regFor(key).push(v); save(); render(); toast(`${label} angelegt.`);
}
function renameValue(key, oldVal, newVal) {
  oldVal = (oldVal || "").trim(); newVal = (newVal || "").trim();
  if (oldVal === newVal) return;
  let n = 0;
  cur().ideas.forEach(i => { if ((i[key] || "").trim() === oldVal) { i[key] = newVal; i.updatedAt = nowTs(); n++; } });
  // Registry mitziehen (auch für Werte ohne Karten)
  const reg = regFor(key), idx = reg.indexOf(oldVal), wasReg = idx >= 0;
  if (wasReg) reg.splice(idx, 1);
  if (newVal && wasReg && !reg.includes(newVal)) reg.push(newVal);
  if (n || wasReg) { save(); render(); toast(newVal ? "Umbenannt." : "Entfernt."); }
}
function mergeValue(key, fromVal, toVal) {
  fromVal = (fromVal || "").trim(); toVal = (toVal || "").trim();
  if (!toVal || fromVal === toVal) return;
  renameValue(key, fromVal, toVal); toast("Zusammengeführt.");
}
function removeValue(key, val) {
  val = (val || "").trim();
  const n = cur().ideas.filter(i => (i[key] || "").trim() === val).length;
  const msg = n ? `„${val}" von ${n} Karte${n === 1 ? "" : "n"} entfernen?` : `„${val}" löschen?`;
  if (!confirm(msg)) return;
  renameValue(key, val, "");
}

/* ---------- view switch + render ---------- */
function switchView(v) {
  $$(".viewtab").forEach(x => x.classList.toggle("active", x.dataset.view === v));
  $("#view-matrix").style.display = v === "matrix" ? "" : "none";
  $("#view-timeline").style.display = v === "timeline" ? "" : "none";
  $("#view-glossary").style.display = v === "glossary" ? "" : "none";
  $("#view-summary").style.display = v === "summary" ? "" : "none";
  if (v === "timeline") { renderTlFilters(); renderTimeline(); }
  if (v === "summary") renderSummary();
  if (v === "glossary") renderGlossary();
}
function render() {
  renderCampaignBar();
  renderMetrics(); renderDomainRow(); renderFilterRow(); renderGrid();
  renderTlFilters(); renderTimeline(); renderGlossary(); renderSummary();
  if (!storageOK && !$("#sw")) $(".footer").insertAdjacentHTML("beforeend", ` <b id="sw" style="color:var(--amber)">· Speicher nicht verfügbar – bitte exportieren.</b>`);
}

/* ---------- events ---------- */
document.addEventListener("click", e => {
  const t = e.target;
  const em = $("#export-menu");
  if (em && !em.hidden && t.id !== "btn-export" && !t.closest(".export-menu")) em.hidden = true;
  const vt = t.closest(".viewtab"); if (vt) { switchView(vt.dataset.view); return; }

  if (t.dataset.dom) { cur().ui.domain = t.dataset.dom; save(); renderDomainRow(); renderGrid(); return; }
  if (t.id === "add-domain") { const n = prompt("Name der neuen Domäne?"); if (n) { cur().domains.push({ id: "d_" + uid(), name: n.trim(), touchpoints: [] }); save(); renderDomainRow(); } return; }
  if (t.id === "add-tp") { const n = prompt("Name des neuen Touchpoints?"); if (n) { domain(cur().ui.domain).touchpoints.push({ id: "t_" + uid(), name: n.trim() }); save(); renderGrid(); } return; }
  if (t.dataset.tpedit) {
    e.stopPropagation(); const tpt = tp(cur().ui.domain, t.dataset.tpedit);
    const n = prompt("Touchpoint umbenennen (leer = löschen):", tpt.name); if (n === null) return;
    if (n.trim() === "") { if (confirm(`Touchpoint „${tpt.name}\" und zugehörige Ideen löschen?`)) { const d = domain(cur().ui.domain); d.touchpoints = d.touchpoints.filter(x => x.id !== tpt.id); cur().ideas = cur().ideas.filter(i => !(i.domainId === d.id && i.tpId === tpt.id)); save(); render(); } }
    else { tpt.name = n.trim(); save(); renderGrid(); } return;
  }
  if (t.closest("[data-segedit]") && !t.closest(".gbody")) {
    const s = seg(t.closest("[data-segedit]").dataset.segedit); const n = prompt("Segment umbenennen:", s.name);
    if (n && n.trim()) { s.name = n.trim(); save(); render(); } return;
  }
  const cell = t.closest(".gbody");
  if (cell && !t.closest(".idea")) { const [tpId, segId] = cell.dataset.cell.split("::"); openCell(tpId, segId); return; }
  const ideaEl = t.closest(".idea");
  if (ideaEl) { const i = cur().ideas.find(x => x.id === ideaEl.dataset.idea); if (i) { openCell(i.tpId, i.segId); drawerEditing = i.id; renderDrawer(); } return; }

  // timeline bar
  const bar = t.closest(".tl-bar");
  if (bar) { const c = cur().ideas.find(x => x.id === bar.dataset.bar); if (c) { cur().ui.domain = c.domainId; openCell(c.tpId, c.segId, c.domainId); drawerEditing = c.id; renderDrawer(); } return; }

  if (t.closest("#f-clear")) { cur().ui.filterMech = ""; cur().ui.filterStatus = ""; save(); renderFilterRow(); renderGrid(); return; }
  if (t.closest("#tlf-clear")) { cur().ui.tl = { domain: "", tp: "", mech: "", status: "" }; save(); renderTlFilters(); renderTimeline(); return; }
  if (t.id === "scrim" || t.id === "drawer-close") { closeDrawer(); drawerMech = null; return; }

  if (t.dataset.addcard) { drawerEditing = "new"; renderDrawer(); return; }
  if (t.dataset.cancel) { drawerEditing = null; renderDrawer(); return; }
  if (t.dataset.kwclear) { const ed = t.closest(".editor"); $(".f-fw", ed).value = ""; $(".f-tw", ed).value = ""; return; }
  const sumEl = t.closest(".card-sum"); if (sumEl) { drawerEditing = sumEl.dataset.edit; renderDrawer(); return; }

  const ed = t.closest(".editor");
  if (ed) {
    if (t.dataset.mech) { t.classList.toggle("on"); return; }
    if (t.dataset.prio !== undefined && t.classList.contains("opt")) { $$(".opt[data-prio]", ed).forEach(o => o.classList.toggle("on", o === t)); return; }
    if (t.dataset.status && t.classList.contains("opt")) { $$(".opt[data-status]", ed).forEach(o => o.classList.toggle("on", o === t)); return; }
    if (t.dataset.del) { if (confirm("Karte löschen?")) { cur().ideas = cur().ideas.filter(x => x.id !== t.dataset.del); drawerEditing = null; save(); renderDrawer(); render(); } return; }
    if (t.dataset.save) {
      const data = readEditor(ed);
      if (!data.title) { toast("Bitte einen Titel eingeben."); return; }
      const ts = nowTs();
      if (t.dataset.save === "new") { cur().ideas.push({ id: uid(), domainId: drawerCell.dom, tpId: drawerCell.tpId, segId: drawerCell.segId, ...data, createdAt: ts, updatedAt: ts }); toast("Karte hinzugefügt."); }
      else { const idea = cur().ideas.find(x => x.id === t.dataset.save); Object.assign(idea, data, { updatedAt: ts }); if (!idea.createdAt) idea.createdAt = ts; toast("Gespeichert."); }
      drawerEditing = null; save(); renderDrawer(); render(); return;
    }
  }

  const jump = t.closest("[data-jump]");
  if (jump) { const [dom, tpId, segId] = jump.dataset.jump.split("::"); switchView("matrix"); cur().ui.domain = dom; renderDomainRow(); renderGrid(); openCell(tpId, segId, dom); return; }
  if (t.dataset.medit) { openMechDrawer(t.dataset.medit); return; }
  if (t.dataset.mdelCard) {
    if (confirm(`„${mech(t.dataset.mdelCard)?.name}" löschen? Verweise in Karten werden entfernt.`)) {
      cur().mechanisms = cur().mechanisms.filter(x => x.id !== t.dataset.mdelCard);
      cur().ideas.forEach(i => { if (i.mechs.includes(t.dataset.mdelCard)) { i.mechs = i.mechs.filter(x => x !== t.dataset.mdelCard); i.updatedAt = nowTs(); } });
      save(); render();
    } return;
  }
  if (t.id === "btn-add-mech") { openMechDrawer("new"); return; }
  if (t.id === "btn-add-val") { addValue(cur().ui.glossDim || "mech"); return; }
  // mech drawer events
  if (t.dataset.mcat) { const pick = t.closest(".mech-cat-pick"); $$(".opt[data-mcat]", pick).forEach(o => o.classList.toggle("on", o === t)); return; }
  if (t.dataset.mcancel) { drawerMech = null; closeDrawer(); return; }
  if (t.dataset.mdel) {
    const mid = t.dataset.mdel;
    if (confirm(`„${mech(mid)?.name}" löschen? Verweise in Karten werden entfernt.`)) {
      cur().mechanisms = cur().mechanisms.filter(x => x.id !== mid);
      cur().ideas.forEach(i => { if (i.mechs.includes(mid)) { i.mechs = i.mechs.filter(x => x !== mid); i.updatedAt = nowTs(); } });
      drawerMech = null; closeDrawer(); save(); render();
    } return;
  }
  if (t.dataset.msave) {
    const ed = t.closest(".editor");
    const name = $(".f-mname", ed).value.trim();
    if (!name) { toast("Bitte einen Namen eingeben."); return; }
    const cat = $(".opt.on[data-mcat]", ed)?.dataset.mcat || "incentive";
    const desc = $(".f-mdesc", ed).value.trim();
    if (t.dataset.msave === "new") {
      cur().mechanisms.push({ id: "m_" + uid(), name, cat, desc });
      toast("Mechanismus hinzugefügt.");
    } else {
      const m = mech(t.dataset.msave);
      m.name = name; m.cat = cat; m.desc = desc;
      toast("Gespeichert.");
    }
    drawerMech = null; closeDrawer(); save(); render(); return;
  }
  if (t.id === "btn-export") { const m = $("#export-menu"); m.hidden = !m.hidden; return; }
  if (t.dataset.export) { exportData(t.dataset.export); $("#export-menu").hidden = true; return; }
  if (t.id === "btn-import") { $("#file-input").click(); return; }
  if (t.id === "btn-print") { window.print(); return; }
  if (t.id === "btn-copy-summary") { copyText(summaryText()); return; }
  if (t.dataset.aadel) { removeValue(t.dataset.aadel, t.dataset.aaval); return; }
  if (t.closest("#sum-since-clear")) { cur().ui.sumSince = ""; save(); renderSummary(); return; }
  if (t.id === "camp-new") { newCampaign(); return; }
  if (t.id === "camp-rename") { renameCampaign(); return; }
  if (t.id === "camp-del") { deleteCampaign(); return; }
});

function exportData(scope) {
  const payload = scope === "workspace" ? state : cur();
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  const slug = s => (s || "export").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "export";
  a.download = (scope === "workspace" ? "touchpoint-workspace" : "kampagne-" + slug(cur().name)) + ".json";
  a.click(); URL.revokeObjectURL(a.href);
}
function importData(parsed) {
  if (parsed && Array.isArray(parsed.campaigns)) {
    state = migrateWorkspace(parsed); toast("Workspace importiert.");
  } else {
    const camp = migrateCampaign(parsed); camp.id = "c_" + uid();
    if (!camp.name || camp.name === "Kampagne") camp.name = "Importierte Kampagne";
    state.campaigns.push(camp); state.activeCampaignId = camp.id; toast("Kampagne importiert.");
  }
  save(); render(); switchView("matrix");
}
function newCampaign() {
  const name = prompt("Name der neuen Kampagne?"); if (!name || !name.trim()) return;
  const withIdeas = confirm("Ideen aus der aktuellen Kampagne mitkopieren?\n\nOK = mit Ideen · Abbrechen = nur Struktur (Segmente, Domänen, Mechanismen)");
  const src = cur();
  const clone = JSON.parse(JSON.stringify({ segments: src.segments, domains: src.domains, mechanisms: src.mechanisms, ideas: withIdeas ? src.ideas : [], ui: src.ui }));
  clone.ideas.forEach(i => i.id = uid());
  const camp = { id: "c_" + uid(), name: name.trim(), subtitle: src.subtitle || "", ...clone };
  state.campaigns.push(camp); state.activeCampaignId = camp.id;
  save(); render(); switchView("matrix"); toast("Kampagne angelegt.");
}
function renameCampaign() {
  const c = cur(); const n = prompt("Kampagne umbenennen:", c.name); if (n === null) return;
  if (n.trim()) c.name = n.trim();
  save(); renderCampaignBar();
}
function deleteCampaign() {
  if (state.campaigns.length <= 1) { toast("Die letzte Kampagne kann nicht gelöscht werden."); return; }
  const c = cur();
  if (!confirm(`Kampagne „${c.name}" mit allen Daten unwiderruflich löschen?`)) return;
  state.campaigns = state.campaigns.filter(x => x.id !== c.id);
  state.activeCampaignId = state.campaigns[0].id;
  save(); render(); switchView("matrix"); toast("Kampagne gelöscht.");
}
function renderCampaignBar() {
  $("#camp-select").innerHTML = state.campaigns.map(c => `<option value="${c.id}" ${c.id === state.activeCampaignId ? "selected" : ""}>${esc(c.name)}</option>`).join("");
  $("#camp-del").disabled = state.campaigns.length <= 1;
}

document.addEventListener("change", e => {
  const id = e.target.id;
  if (id === "camp-select") { state.activeCampaignId = e.target.value; save(); render(); switchView("matrix"); return; }
  if (id === "sum-seg") { cur().ui.sumSeg = e.target.value || ""; save(); renderSummary(); return; }
  if (id === "gloss-dim") { cur().ui.glossDim = e.target.value || "mech"; save(); renderGlossary(); return; }
  if (id === "sum-action") { cur().ui.sumAction = e.target.value || ""; save(); renderSummary(); return; }
  if (id === "sum-article") { cur().ui.sumArticle = e.target.value || ""; save(); renderSummary(); return; }
  if (id === "sum-since") { cur().ui.sumSince = e.target.value || ""; save(); renderSummary(); return; }
  if (e.target.dataset.aaedit) { renameValue(e.target.dataset.aaedit, e.target.dataset.aaold, e.target.value); return; }
  if (e.target.dataset.aamerge) { mergeValue(e.target.dataset.aamerge, e.target.dataset.aafrom, e.target.value); return; }
  if (id === "f-mech") { cur().ui.filterMech = e.target.value; save(); renderFilterRow(); renderGrid(); }
  if (id === "f-stat") { cur().ui.filterStatus = e.target.value; save(); renderFilterRow(); renderGrid(); }
  if (id === "tlf-dom") { cur().ui.tl.domain = e.target.value; cur().ui.tl.tp = ""; save(); renderTlFilters(); renderTimeline(); }
  if (id === "tlf-tp") { cur().ui.tl.tp = e.target.value; save(); renderTimeline(); }
  if (id === "tlf-mech") { cur().ui.tl.mech = e.target.value; save(); renderTlFilters(); renderTimeline(); }
  if (id === "tlf-stat") { cur().ui.tl.status = e.target.value; save(); renderTlFilters(); renderTimeline(); }
  if (id === "file-input") {
    const f = e.target.files[0]; if (!f) return; const rd = new FileReader();
    rd.onload = () => { try { importData(JSON.parse(rd.result)); } catch { toast("Import fehlgeschlagen – ungültige Datei."); } };
    rd.readAsText(f); e.target.value = "";
  }
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

(async function () { await load(); render(); })();
</script>
</body>
</html>
